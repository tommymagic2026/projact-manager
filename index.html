<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>合力集团项目管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            color: #333;
        }

        /* 登录页面 */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-box {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 24px;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #555;
        }

        .login-form input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-error {
            color: #ff5252;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        /* 主页面 */
        .main-page {
            display: none;
        }

        /* 头部 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .menu-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        /* 容器 */
        .container {
            padding: 15px;
            padding-bottom: 80px;
        }

        /* 项目卡片 */
        .project-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.2s;
        }

        .project-card:active {
            transform: scale(0.98);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .project-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }

        .project-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-progress {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-completed {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status-pending {
            background: #fff3e0;
            color: #f57c00;
        }

        .project-desc {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }

        /* 任务列表 */
        .tasks-section {
            margin-top: 15px;
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
        }

        .tasks-section h4 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #555;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
        }

        .task-content {
            flex: 1;
        }

        .task-name {
            font-size: 15px;
        }

        .task-date {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .task-completed .task-name {
            text-decoration: line-through;
            color: #999;
        }

        .task-person {
            font-size: 12px;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 8px;
            color: #666;
            margin-left: 8px;
        }

        .delete-task-btn {
            background: #ff5252;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
        }

        /* 添加任务按钮 */
        .add-task-btn {
            width: 100%;
            padding: 10px;
            background: #f0f0f0;
            border: 2px dashed #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }

        .add-task-btn:hover {
            background: #e8e8e8;
            border-color: #667eea;
            color: #667eea;
        }

        /* 项目按钮组 */
        .project-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .project-action-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-edit {
            background: #667eea;
            color: white;
        }

        .btn-add-task {
            background: #4caf50;
            color: white;
        }

        .btn-delete {
            background: #ff5252;
            color: white;
        }

        /* 添加项目按钮 */
        .add-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .add-btn:active {
            transform: scale(0.9);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: flex-end;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #555;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .add-task-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .add-task-row input {
            flex: 1;
        }

        .add-task-row .task-date-input {
            width: 120px;
        }

        .add-task-row .task-person-input {
            width: 80px;
        }

        .remove-task-btn {
            background: #ff5252;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-task-btn-inline {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 8px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

        .btn-cancel {
            background: #f5f5f5;
            color: #666;
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* 侧边菜单 */
        .sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100vh;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            transition: right 0.3s ease;
            z-index: 300;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 299;
            display: none;
        }

        .sidebar-overlay.show {
            display: block;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .sidebar-header h3 {
            font-size: 18px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            padding: 0;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
        }

        /* 用户列表 */
        .user-list {
            margin-bottom: 20px;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 15px;
            font-weight: 500;
        }

        .user-role {
            font-size: 12px;
            color: #667eea;
            margin-top: 2px;
        }

        .delete-user-btn {
            background: #ff5252;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .add-user-form {
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .add-user-form h4 {
            margin-bottom: 15px;
            font-size: 16px;
        }

        .add-user-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-page" id="loginPage">
        <div class="login-box">
            <h1>合力项目管理系统</h1>
            <form class="login-form" onsubmit="event.preventDefault(); login();">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码">
                </div>
                <button type="submit" class="login-btn">登录</button>
                <div class="login-error" id="loginError">用户名或密码错误</div>
            </form>
        </div>
    </div>

    <!-- 主页面 -->
    <div class="main-page" id="mainPage">
        <div class="header">
            <div class="header-top">
                <h1>项目管理</h1>
                <div class="header-actions">
                    <button class="menu-btn" id="menuBtn" onclick="toggleSidebar();">☰ 菜单</button>
                    <button class="logout-btn" onclick="logout();">退出</button>
                </div>
            </div>
        </div>

        <div class="container" id="projectContainer">
            <!-- 项目列表将在这里动态生成 -->
        </div>

        <div class="add-btn" onclick="openAddProjectModal();">+</div>
    </div>

    <!-- 添加/编辑项目模态框 -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <h3 class="modal-title" id="projectModalTitle">添加项目</h3>
            <form id="projectForm">
                <input type="hidden" id="editProjectId">
                <div class="form-group">
                    <label>项目名称</label>
                    <input type="text" id="projectName" placeholder="请输入项目名称">
                </div>
                <div class="form-group">
                    <label>项目描述</label>
                    <textarea id="projectDesc" placeholder="请输入项目描述"></textarea>
                </div>
                <div class="form-group">
                    <label>项目状态</label>
                    <select id="projectStatus">
                        <option value="pending">待开始</option>
                        <option value="progress" selected>进行中</option>
                        <option value="completed">已完成</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>初始任务</label>
                    <div id="dynamicTasks">
                        <div class="add-task-row">
                            <input type="text" placeholder="任务名称" class="task-name-input">
                            <input type="date" class="task-date-input">
                            <input type="text" placeholder="负责人" class="task-person-input">
                        </div>
                    </div>
                    <button type="button" class="add-task-btn-inline" onclick="addTaskField();">+ 添加任务</button>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-cancel" onclick="closeProjectModal();">取消</button>
                    <button type="submit" class="btn btn-save">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 添加任务模态框 -->
    <div class="modal" id="addTaskModal">
        <div class="modal-content">
            <h3 class="modal-title">添加任务</h3>
            <form id="addTaskForm">
                <input type="hidden" id="currentProjectId">
                <div class="form-group">
                    <label>任务名称</label>
                    <input type="text" id="newTaskName" placeholder="请输入任务名称">
                </div>
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="newTaskDate">
                </div>
                <div class="form-group">
                    <label>负责人</label>
                    <input type="text" id="newTaskPerson" placeholder="请输入负责人">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-cancel" onclick="closeAddTaskModal();">取消</button>
                    <button type="submit" class="btn btn-save">添加</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 侧边菜单 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar();"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>用户管理</h3>
            <button class="close-btn" onclick="toggleSidebar();">×</button>
        </div>
        <div class="user-list" id="userList">
            <!-- 用户列表动态生成 -->
        </div>
        <div class="add-user-form" id="addUserForm" style="display: none;">
            <h4>添加新用户</h4>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="newUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="newPassword" placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label>角色</label>
                <select id="newUserRole">
                    <option value="user">普通用户</option>
                    <option value="admin">管理员</option>
                </select>
            </div>
            <button class="add-user-btn" onclick="addUser();">添加用户</button>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ============================================================
        // ⚙️  配置区：填入你的 Supabase 项目信息（见下方说明）
        // ============================================================
        const SUPABASE_URL = 'https://ykijfxxbhdnutqlloxuv.supabase.co';          // 例如 https://abcdefg.supabase.co
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlraWpmeHhiaGRudXRxbGxveHV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MDg3MDgsImV4cCI6MjA5NjQ4NDcwOH0.JR67KI4UfhhQLL8mekOfLNsndLsS7TZe2IH3SMPXjLQ';      // 在 Supabase → Project Settings → API 中找到
        // ============================================================

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 当前登录用户（存在内存里，不用localStorage）
        let _currentUser = null;

        // ---- 工具：显示加载状态 ----
        function setLoading(msg) {
            const c = document.getElementById('projectContainer');
            if (msg) c.innerHTML = `<div style="text-align:center;padding:40px;color:#999;">${msg}</div>`;
        }

        // ---- 获取当前用户 ----
        function getCurrentUser() {
            return _currentUser;
        }

        // ============================================================
        // 登录
        // ============================================================
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) return;

            const { data, error } = await sb
                .from('users')
                .select('*')
                .eq('username', username)
                .eq('password', password)
                .single();

            if (error || !data) {
                document.getElementById('loginError').classList.add('show');
                return;
            }

            _currentUser = data;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
            document.getElementById('loginError').classList.remove('show');
            await renderProjects();
            await renderUserList();
        }

        // ============================================================
        // 退出登录
        // ============================================================
        function logout() {
            _currentUser = null;
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('mainPage').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginError').classList.remove('show');
        }

        // ============================================================
        // 侧边栏
        // ============================================================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
            if (_currentUser && _currentUser.role === 'admin') {
                document.getElementById('addUserForm').style.display = 'block';
            }
        }

        // ============================================================
        // 用户管理
        // ============================================================
        async function renderUserList() {
            const { data: users } = await sb.from('users').select('*').order('id');
            const container = document.getElementById('userList');
            container.innerHTML = '<h4>已添加用户</h4>' + (users || []).map(user => `
                <div class="user-item">
                    <div class="user-info">
                        <div class="user-name">${user.username}</div>
                        <div class="user-role">${user.role === 'admin' ? '管理员' : '普通用户'}</div>
                    </div>
                    ${user.username !== 'admin' && _currentUser.role === 'admin' ?
                        `<button class="delete-user-btn" onclick="deleteUser(${user.id});">删除</button>` : ''}
                </div>
            `).join('');
        }

        async function addUser() {
            if (_currentUser.role !== 'admin') { alert('只有管理员可以添加用户'); return; }

            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value;
            const role     = document.getElementById('newUserRole').value;

            if (!username || !password) { alert('请填写完整信息'); return; }

            // 检查用户名是否重复
            const { data: exist } = await sb.from('users').select('id').eq('username', username).single();
            if (exist) { alert('用户名已存在'); return; }

            const { error } = await sb.from('users').insert([{ username, password, role }]);
            if (error) { alert('添加失败：' + error.message); return; }

            document.getElementById('newUsername').value = '';
            document.getElementById('newPassword').value = '';
            alert('添加成功');
            await renderUserList();
        }

        async function deleteUser(userId) {
            if (!confirm('确定要删除这个用户吗？')) return;
            await sb.from('users').delete().eq('id', userId);
            await renderUserList();
        }

        // ============================================================
        // 项目 CRUD
        // ============================================================
        async function renderProjects() {
            setLoading('加载中...');
            const { data: projects, error } = await sb
                .from('projects')
                .select('*, tasks(*)')
                .order('id', { ascending: false });

            const container = document.getElementById('projectContainer');

            if (error) {
                container.innerHTML = `<div style="text-align:center;padding:40px;color:#f00;">加载失败：${error.message}</div>`;
                return;
            }

            if (!projects || projects.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无项目，点击右下角 + 添加新项目</div>';
                return;
            }

            container.innerHTML = projects.map(project => {
                const tasks = project.tasks || [];
                return `
                    <div class="project-card">
                        <div class="project-header">
                            <div class="project-title">${project.name}</div>
                            <span class="project-status status-${project.status}">
                                ${project.status === 'pending' ? '待开始' : project.status === 'progress' ? '进行中' : '已完成'}
                            </span>
                        </div>
                        ${project.desc ? `<div class="project-desc">${project.desc}</div>` : ''}
                        <div class="tasks-section">
                            <h4>任务列表</h4>
                            ${tasks.map(task => `
                                <div class="task-item ${task.completed ? 'task-completed' : ''}">
                                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}
                                           onchange="toggleTask(${project.id}, ${task.id}, this.checked)">
                                    <div class="task-content">
                                        <div class="task-name">${task.name}</div>
                                        ${task.date ? `<div class="task-date">${task.date}</div>` : ''}
                                    </div>
                                    ${task.person ? `<span class="task-person">${task.person}</span>` : ''}
                                    <button class="delete-task-btn" onclick="deleteTask(${project.id}, ${task.id})">删除</button>
                                </div>
                            `).join('')}
                            <button class="add-task-btn" onclick="openAddTaskModal(${project.id});">+ 添加新任务</button>
                        </div>
                        <div class="project-actions">
                            <button class="project-action-btn btn-edit" onclick="editProject(${project.id});">编辑</button>
                            <button class="project-action-btn btn-add-task" onclick="openAddTaskModal(${project.id});">添加任务</button>
                            <button class="project-action-btn btn-delete" onclick="deleteProject(${project.id});">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openAddProjectModal() {
            document.getElementById('projectModalTitle').textContent = '添加项目';
            document.getElementById('projectForm').reset();
            document.getElementById('editProjectId').value = '';
            document.getElementById('dynamicTasks').innerHTML = `
                <div class="add-task-row">
                    <input type="text" placeholder="任务名称" class="task-name-input">
                    <input type="date" class="task-date-input">
                    <input type="text" placeholder="负责人" class="task-person-input">
                </div>`;
            document.getElementById('projectModal').classList.add('show');
        }

        function closeProjectModal() {
            document.getElementById('projectModal').classList.remove('show');
        }

        function addTaskField() {
            const container = document.getElementById('dynamicTasks');
            const newRow = document.createElement('div');
            newRow.className = 'add-task-row';
            newRow.innerHTML = `
                <input type="text" placeholder="任务名称" class="task-name-input">
                <input type="date" class="task-date-input">
                <input type="text" placeholder="负责人" class="task-person-input">
                <button class="remove-task-btn" onclick="this.parentElement.remove();">−</button>`;
            container.appendChild(newRow);
        }

        // 保存项目（新建 or 编辑）
        document.getElementById('projectForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const editId = document.getElementById('editProjectId').value;
            const name   = document.getElementById('projectName').value;
            const desc   = document.getElementById('projectDesc').value;
            const status = document.getElementById('projectStatus').value;

            // 收集任务行
            const taskRows = [];
            document.querySelectorAll('.add-task-row').forEach(row => {
                const taskName = row.querySelector('.task-name-input').value;
                if (taskName) {
                    taskRows.push({
                        name:   taskName,
                        date:   row.querySelector('.task-date-input').value || null,
                        person: row.querySelector('.task-person-input').value || null,
                        completed: false
                    });
                }
            });

            if (editId) {
                // 编辑：更新项目基本信息
                await sb.from('projects').update({ name, "desc": desc, status }).eq('id', editId);
                // 若填写了新任务行则追加（不清空旧任务）
                if (taskRows.length > 0) {
                    const withProjectId = taskRows.map(t => ({ ...t, project_id: parseInt(editId) }));
                    await sb.from('tasks').insert(withProjectId);
                }
            } else {
                // 新建项目
                const { data: newProject } = await sb
                    .from('projects')
                    .insert([{ name, "desc": desc, status }])
                    .select()
                    .single();
                if (newProject && taskRows.length > 0) {
                    const withProjectId = taskRows.map(t => ({ ...t, project_id: newProject.id }));
                    await sb.from('tasks').insert(withProjectId);
                }
            }

            await renderProjects();
            closeProjectModal();
        });

        // 编辑项目（回填数据）
        async function editProject(projectId) {
            const { data: project } = await sb
                .from('projects')
                .select('*, tasks(*)')
                .eq('id', projectId)
                .single();

            document.getElementById('projectModalTitle').textContent = '编辑项目';
            document.getElementById('editProjectId').value = project.id;
            document.getElementById('projectName').value = project.name;
            document.getElementById('projectDesc').value = project.desc || '';
            document.getElementById('projectStatus').value = project.status;

            const tasks = project.tasks || [];
            document.getElementById('dynamicTasks').innerHTML = tasks.length > 0
                ? tasks.map(task => `
                    <div class="add-task-row">
                        <input type="text" placeholder="任务名称" class="task-name-input" value="${task.name}">
                        <input type="date" class="task-date-input" value="${task.date || ''}">
                        <input type="text" placeholder="负责人" class="task-person-input" value="${task.person || ''}">
                        <button class="remove-task-btn" onclick="this.parentElement.remove();">−</button>
                    </div>`).join('')
                : `<div class="add-task-row">
                        <input type="text" placeholder="任务名称" class="task-name-input">
                        <input type="date" class="task-date-input">
                        <input type="text" placeholder="负责人" class="task-person-input">
                   </div>`;

            document.getElementById('projectModal').classList.add('show');
        }

        async function deleteProject(projectId) {
            if (!confirm('确定要删除这个项目吗？')) return;
            // tasks 表设了级联删除，删项目会自动删任务
            await sb.from('projects').delete().eq('id', projectId);
            await renderProjects();
        }

        // ============================================================
        // 任务 CRUD
        // ============================================================
        function openAddTaskModal(projectId) {
            document.getElementById('currentProjectId').value = projectId;
            document.getElementById('addTaskForm').reset();
            document.getElementById('addTaskModal').classList.add('show');
        }

        function closeAddTaskModal() {
            document.getElementById('addTaskModal').classList.remove('show');
        }

        document.getElementById('addTaskForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const projectId = parseInt(document.getElementById('currentProjectId').value);
            const name      = document.getElementById('newTaskName').value;
            const date      = document.getElementById('newTaskDate').value || null;
            const person    = document.getElementById('newTaskPerson').value || null;

            await sb.from('tasks').insert([{ project_id: projectId, name, date, person, completed: false }]);
            await renderProjects();
            closeAddTaskModal();
        });

        async function toggleTask(projectId, taskId, checked) {
            await sb.from('tasks').update({ completed: checked }).eq('id', taskId);
            await renderProjects();
        }

        async function deleteTask(projectId, taskId) {
            if (!confirm('确定要删除这个任务吗？')) return;
            await sb.from('tasks').delete().eq('id', taskId);
            await renderProjects();
        }

        // ============================================================
        // 页面初始化
        // ============================================================
        window.onload = function() {
            // 未配置时给出提示
            if (SUPABASE_URL.includes('你的')) {
                document.getElementById('loginPage').innerHTML = `
                    <div class="login-box" style="max-width:500px;margin:auto;">
                        <h1 style="color:#e53935;font-size:18px;">⚠️ 请先配置 Supabase</h1>
                        <p style="margin-top:15px;line-height:1.8;color:#555;font-size:14px;">
                            请打开 index.html 文件，找到顶部 <b>⚙️ 配置区</b>，<br>
                            填入你的 <b>SUPABASE_URL</b> 和 <b>SUPABASE_KEY</b> 后刷新页面。<br><br>
                            👉 去 <a href="https://supabase.com" target="_blank">supabase.com</a> 注册并创建项目，<br>
                            在 Project Settings → API 中复制这两个值。
                        </p>
                    </div>`;
                return;
            }
            // 正常启动：直接显示登录页
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('mainPage').style.display = 'none';
        };
    </script>
</body>
</html>
